<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartsourcingKe ERP</title>
    <style>
        :root { --primary:#1f2d3d; --green:#27ae60; --blue:#3498db; --red:#e74c3c; --bg:#f4f6f9; }
        body { font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin:0; padding:20px; background:var(--bg); }
        .hidden { display:none !important; }
        .container { max-width:1200px; margin:auto; background:white; padding:20px; border-radius:12px; box-shadow:0 5px 20px rgba(0,0,0,0.1); }
        .btn { padding:8px 12px; border:none; border-radius:6px; cursor:pointer; color:white; font-weight:bold; }
        .btn-green { background:var(--green); }
        .btn-blue { background:var(--blue); }
        .btn-red { background:var(--red); }
        .tab-menu { display:flex; gap:10px; margin-bottom:25px; background:#eee; padding:10px; border-radius:10px; flex-wrap:wrap; }
        .tab-btn { flex:1; padding:12px; border:none; cursor:pointer; border-radius:6px; font-weight:bold; background:#ddd; }
        .tab-btn.active { background:white; color:var(--blue); }
        .card { background:white; padding:15px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1); margin-bottom:20px; }
        table { width:100%; border-collapse:collapse; margin-top:10px; }
        th, td { padding:8px; border-bottom:1px solid #eee; text-align:left; }
        input, select { width:100%; padding:8px; margin-bottom:10px; border-radius:6px; border:1px solid #ccc; }
        .brand-header { text-align:center; margin-bottom:25px; border-bottom:2px solid #eee; padding-bottom:15px; }
        .brand-logo { max-height:100px; margin:auto; display:block; margin-bottom:10px; }
        .brand-name { font-size:2em; font-weight:bold; margin:0; }
        .brand-motto { font-style:italic; color:#7f8c8d; margin-top:5px; }
        .login-container { max-width:400px; margin:100px auto; text-align:center; padding:30px; }
		.chat-bubble { max-width: 70%; padding: 10px; border-radius: 12px; margin-bottom: 5px; position: relative; }
		.chat-left { align-self: flex-start; background: #e9e9eb; color: black; border-bottom-left-radius: 2px; }
		.chat-right { align-self: flex-end; background: var(--blue); color: white; border-bottom-right-radius: 2px; }
		.product-card { border: 1px solid #eee; padding: 15px; border-radius: 8px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
		.product-info h4 { margin: 0 0 10px 0; color: var(--primary); }
		.sku { font-size: 11px; color: #7f8c8d; }
		.price { font-weight: bold; color: var(--green); margin: 5px 0; }
		.stock { font-size: 13px; }
		.text-red { color: var(--red); font-weight: bold; }
		.product-actions { margin-top: 10px; display: flex; gap: 5px; }
		.btn-edit { background: #95a5a6; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
		.btn-add { background: var(--blue); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>>
</head>
<body>

<div id="loginPage" class="container login-container">
    <h2 id="loginCompanyName">SmartsourcingKe ERP</h2>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPassword" type="password" placeholder="Password">
    <button class="btn btn-blue" onclick="login()">Login</button>
</div>

<div id="dashboard" class="container hidden">
    <div class="brand-header">
        <img id="companyLogo" class="brand-logo hidden">
        <p id="companyName" class="brand-name"></p>
        <p id="companyTagline" class="brand-motto"></p>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 id="welcome">Welcome</h2>
        <button class="btn btn-red" onclick="logout()">Logout</button>
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="openTab('ordersTab',this)">Orders</button>
        <button class="tab-btn" onclick="openTab('retailersTab',this)">Retailers</button>
        <button class="tab-btn" onclick="openTab('inventoryTab',this)">Inventory</button>
        <button class="tab-btn" onclick="openTab('corporateTab',this)">Corporate</button>
        <button id="payrollBtn" class="tab-btn hidden" onclick="openTab('payrollTab',this)">Payroll</button>
        <button id="adminBtn" class="tab-btn hidden" onclick="openTab('adminTab',this)">Admin</button>
        <button id="profitBtn" class="tab-btn hidden" onclick="openTab('profitTab',this)">Profit</button>
        <button class="tab-btn" onclick="openTab('messagesTab',this)">Messages</button>
    </div>

    <div id="ordersTab" class="tab-content">
        <div class="card">
            <h3>New Retailer Order</h3>
            <label>1. Select Retailer:</label>
            <select id="retailerSelect"><option value="">Loading...</option></select>
            <label>2. Product:</label>
            <select id="orderProductSelect"></select>
            <input type="number" id="orderQty" value="1">
            <button class="btn btn-blue" onclick="addToCart()">Add to Cart</button>
            <tbody id="cartBody"></tbody>
            <button class="btn btn-green" style="width:100%;" onclick="createOrder()">Process Final Order</button>
        </div>
        <div class="card">
            <h3>Order History</h3>
            <tbody id="ordersBody"></tbody>
        </div>
    </div>

    <div id="retailersTab" class="tab-content hidden">
        <div class="card">
            <h3>Register Retailer</h3>
            <input id="retailerName" placeholder="Business Name">
            <input id="retailerPhone" placeholder="Phone">
            <input id="retailerLocation" placeholder="Location">
            <button class="btn btn-blue" onclick="addRetailer()">Save Retailer</button>
        </div>
        <div class="card">
            <tbody id="retailerBody"></tbody>
        </div>
    </div>

    <div id="inventoryTab" class="tab-content hidden">
        <div class="card">
            <h3>Add Product</h3>
            <input id="productName" placeholder="Name">
            <input id="productStock" type="number" placeholder="Stock">
            <input id="productBasePrice" type="number" placeholder="Price">
            <input id="productFee" type="number" placeholder="Fee">
            <button class="btn btn-green" onclick="addProduct()">Save Product</button>
        </div>
        <div id="productGrid"></div>
    </div>

    <div id="corporateTab" class="tab-content hidden">
        <div class="card">
            <h3>Register School</h3>
            <input id="schoolName" placeholder="School Name">
            <input id="schoolPhone" placeholder="Phone">
            <input id="schoolLocation" placeholder="Location">
            <button class="btn btn-blue" onclick="addSchool()">Register School</button>
        </div>
        <div class="card">
            <h3>Corporate Order</h3>
            <select id="corpSchoolSelect"></select>
            <input id="cbcLevel" placeholder="Grade">
            <input id="cbcStudents" type="number" placeholder="Students">
            <input id="cbcPrice" type="number" placeholder="Price">
            <button class="btn btn-blue" onclick="addCorporateToCart()">Add to Cart</button>
            <div id="corporateCartView"></div>
            <button class="btn btn-green" onclick="createCorporateOrder()">Process Full Order</button>
        </div>
        <tbody id="corporateBody"></tbody>
    </div>

    <div id="payrollTab" class="tab-content hidden">
        <button class="btn btn-green" onclick="generatePayroll()">Generate Monthly Payroll</button>
        <tbody id="payrollBody"></tbody>
    </div>

    <div id="adminTab" class="tab-content hidden">
        <div class="card">
            <h3>Company Branding</h3>
            <input id="brandInputName" placeholder="Company Name">
            <button class="btn btn-blue" onclick="updateBranding()">Save Branding</button>
        </div>
        <div class="card">
            <h3>Register Staff</h3>
            <input id="empName" placeholder="Full Name">
            <input id="empEmail" placeholder="Email">
            <select id="empRole"><option value="staff">Staff</option><option value="admin">Admin</option></select>
            <button class="btn btn-blue" onclick="addEmployee()">Create Employee</button>
        </div>
        <tbody id="adminUserTableBody"></tbody>
    </div>

    <div id="messagesTab" class="tab-content hidden">
        <div id="messagesContainer" style="height:400px; overflow-y:auto; border:1px solid #eee; padding:15px; background:#fafafa;"></div>
        <div style="display:flex; gap:10px;">
            <input id="messageInput" placeholder="Type message...">
            <button class="btn btn-blue" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <div id="profitTab" class="tab-content hidden">
        <div class="card">
            <h3>Financial Performance</h3>
            <tbody id="financeBody"></tbody>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="supabase.js"></script> 

<script src="core.js"></script>



<script src="sync.js"></script>

<script src="ui.js"></script>

<script src="auth.js"></script>

<script src="branding.js"></script>

<script src="products.js"></script>

<script src="retailers.js"></script>

<script src="orders.js"></script>

<script src="retailerOrders.js"></script>

<script src="corporateOrders.js"></script>

<script src="employees.js"></script>

<script src="payroll.js"></script>

<script src="messaging.js"></script>

<script src="reports.js"></script>



<script src="app.js"></script>

<script src="render.js"></script>



<script>

    document.addEventListener("DOMContentLoaded", async () => {

        window.db = window.db || {};

        window.cart = [];



        if (typeof loadBranding === "function") {

            await loadBranding();

        }



        // Use the function in app.js to start

        if (typeof initApp === "function") {

            await initApp();

        }

    });



    function openTab(tabId, btn) {

        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));

        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

        

        const target = document.getElementById(tabId);

        if (target) {

            target.classList.remove('hidden');

            btn.classList.add('active');

        }



        if (tabId === 'profitTab' && typeof renderProfitDashboard === "function") {

            renderProfitDashboard();

        }

    }

</script>
</body>
</html>
